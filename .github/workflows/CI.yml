name: CI
on:
  push:
    paths-ignore:
      - '**.md'
      - '**.html'
      - '**.schelp'
      - 'README'
      - 'LICENSE'
      - '_data/**'
      - '.bundle/**'
      - 'assets/**'
      - 'index.*'
      - '_config.yml'
      - 'Gemfile*'
  pull_request:
    paths-ignore:
      - '**.md'
      - '**.html'
      - '**.schelp'
      - 'README'
      - 'LICENSE'
      - '_data/**'
      - '.bundle/**'
      - 'assets/**'
      - 'index.*'
      - '_config.yml'
      - 'Gemfile*'
  workflow_dispatch:

jobs:
  build:

    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux-x64-22.04
            os: ubuntu-22.04
            cmake-flags: '-G "Unix Makefiles"'
            cache-path: '~/.cache/ccache'

          - name: Linux-x64-24.04
            os: ubuntu-24.04
            cmake-flags: '-G "Unix Makefiles"'
            cache-path: '~/.cache/ccache'
            
          - name: macOS
            os: macos-14
            cmake-flags: '-G Xcode -D CMAKE_OSX_ARCHITECTURES="x86_64;arm64"'
            xcode-version: '15.4'
            deployment-target: '10.15'
            cache-path: '~/Library/Caches/ccache'
            
          - name: Windows-32bit
            os: windows-2022
            cmake-flags: '-G "Visual Studio 17 2022" -A Win32'
            vcpkg-triplet: 'x86-windows-static-md'
            cache-path: '~/AppData/Local/ccache'
            vcpkg-cache-path: '~/AppData/Local/vcpkg/archives'
            
          - name: Windows-64bit
            os: windows-2022
            cmake-flags: '-G "Visual Studio 17 2022" -A x64'
            vcpkg-triplet: 'x64-windows-static-md-release'
            cache-path: '~/AppData/Local/ccache'
            vcpkg-cache-path: '~/AppData/Local/vcpkg/archives'

    env:
      SC_SRC_PATH: ${{ github.workspace }}/supercollider
      BUILD_PATH: ${{ github.workspace }}/build
      INSTALL_PATH: ${{ github.workspace }}/build/install
      DEVELOPER_DIR: '/Applications/Xcode_${{ matrix.xcode-version }}.app/Contents/Developer'
      MACOSX_DEPLOYMENT_TARGET: '${{ matrix.deployment-target }}'

    name: ${{ matrix.name }}
    steps:
    - name: set filename # use tag or sha for version
      id: set-filename
      shell: bash
      run: |
        if [[ "$GITHUB_REF" == refs/tags/* ]]; then
          FULL_TAG=${GITHUB_REF#refs/tags/}
          VERSION=${FULL_TAG##Version-}
        else
          VERSION=$GITHUB_SHA
        fi
        echo "filename=sc3-plugins-$VERSION-${{ matrix.name }}" >> $GITHUB_OUTPUT
    - name: checkout sc3-plugins
      uses: actions/checkout@v7
      with:
        submodules: recursive
    - name: checkout supercollider
      uses: actions/checkout@v7
      with:
        repository: supercollider/supercollider
        path: ${{ env.SC_SRC_PATH }}
        ref: main
    - name: cache ccache
      uses: actions/cache@v6
      if: matrix.cache-path
      with:
        path: ${{ matrix.cache-path }}
        key: ${{ matrix.name }}-${{ github.run_id }}
        restore-keys: ${{ matrix.name }}-
    - name: cache vcpkg
      if: matrix.vcpkg-triplet && matrix.vcpkg-cache-path
      uses: actions/cache@v6
      with:
        path: ${{ matrix.vcpkg-cache-path }}
        key: vcpkg-${{ matrix.name }}-${{ github.run_id }}
        restore-keys: vcpkg-${{ matrix.name }}-
    - name: install Linux dependencies
      if: runner.os == 'Linux'
      run: sudo apt-get install --yes libfftw3-dev ccache
    - name: install macOS dependencies
      if: runner.os == 'macOS'
      run: brew install ccache
    - name: install Windows dependencies
      if: runner.os == 'Windows'
      shell: bash
      run: |
        choco install ccache --no-progress
        echo "`echo c:/ProgramData/chocolatey/lib/ccache/tools/ccache*`" >> $GITHUB_PATH # put the direct path before the path of the choco's "shim" (link substitute)

        if [[ -n "${{ matrix.vcpkg-triplet }}" ]]; then
          echo "running vcpkg install fftw3 --triplet=${{ matrix.vcpkg-triplet }}"
          vcpkg install fftw3 --triplet="${{ matrix.vcpkg-triplet }}"
        fi
    - name: configure
      shell: bash
      run: |
        mkdir $BUILD_PATH && cd $BUILD_PATH
        set ADDITIONAL_CMAKE_FLAGS=
        if [[ -n "${{ matrix.vcpkg-triplet }}" ]]; then
          ADDITIONAL_CMAKE_FLAGS="$ADDITIONAL_CMAKE_FLAGS -D CMAKE_TOOLCHAIN_FILE=$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake -D VCPKG_TARGET_TRIPLET=${{ matrix.vcpkg-triplet }}"
        fi
        cmake ${{ matrix.cmake-flags }} -D SC_PATH=$SC_SRC_PATH -D CMAKE_BUILD_TYPE=Release -D SUPERNOVA=ON -D CMAKE_INSTALL_PREFIX=$INSTALL_PATH -D IN_PLACE_BUILD=OFF $ADDITIONAL_CMAKE_FLAGS ..
    - name: build
      shell: bash
      working-directory: ${{ env.BUILD_PATH }}
      env:
        CMAKE_BUILD_PARALLEL_LEVEL: 4
      run: |
        cmake --build . --config Release --target install
    - name: compress plugins
      shell: bash
      working-directory: ${{ env.INSTALL_PATH }}
      run: | 
        if [[ "${{ runner.os }}" == "Windows" ]]; then
          7z a ${{ steps.set-filename.outputs.filename }}.zip -tzip .
        else
          zip -r ${{ steps.set-filename.outputs.filename }}.zip .
        fi
    - name: upload artifacts
      uses: actions/upload-artifact@v7
      with:
        name: ${{ steps.set-filename.outputs.filename }}
        path: ${{ env.INSTALL_PATH }}/${{ steps.set-filename.outputs.filename }}.zip
    - name: deploy release
      if: startsWith(github.ref, 'refs/tags/')
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        prerelease: true
        file: ${{ env.INSTALL_PATH }}/${{ steps.set-filename.outputs.filename }}.zip
        tag: ${{ github.ref }}
